{{- with .Values.loadBalancer.dnsZone.domain }}
# The DNSZone advertised type=LoadBalancer Services get their <svc>-<ns>.<domain>
# records in. Owned by this chart; named after the domain, which is what the
# operator's --loadbalancer-dns-zone references.
apiVersion: netbird.io/v1alpha1
kind: DNSZone
metadata:
  name: {{ . }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "netbird-operator.labels" $ | nindent 4 }}
spec:
  name: {{ . | quote }}
  domain: {{ . | quote }}
  enabled: true
  {{- with $.Values.loadBalancer.dnsZone.distributionGroups }}
  distributionGroups:
    {{- range . }}
    - name: {{ . | quote }}
    {{- end }}
  {{- end }}
{{- end }}
