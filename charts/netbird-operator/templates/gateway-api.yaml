{{- if .Values.gatewayAPI.enabled }}
# These GatewayClasses are cluster-scoped and referenced by long-lived Gateways
# that may live outside this release; keep them across upgrades/uninstall so a
# chart change can't prune them and leave referencing Gateways (and the
# operator finalizer that protects them) stuck on a Terminating class.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: netbird-private
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  controllerName: "gateway.netbird.io/controller"
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: netbird-public
  labels:
    {{- include "netbird-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  controllerName: "gateway.netbird.io/controller"
{{- end }}
