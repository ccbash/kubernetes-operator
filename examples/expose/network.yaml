# The NetBird network this cluster's LoadBalancer Services are advertised into.
apiVersion: netbird.io/v1alpha1
kind: Network
metadata:
  name: kube
  namespace: netbird
spec:
  name: kube
---
# Routing peers for the network. This example reuses an existing NetBird group
# (e.g. the group the host-level netbird on your nodes auto-joins via its setup
# key) — the operator creates only the router and deploys nothing. To let the
# operator run a hostNetwork netbird-client DaemonSet instead, replace
# `peers.group` with `peers.deploy: {}`.
apiVersion: netbird.io/v1alpha1
kind: NetworkRouter
metadata:
  name: kube
  namespace: netbird
spec:
  networkRef: { name: kube, namespace: netbird }
  peers:
    group: { name: kube-nodes }
# Note: the DNS zone is NOT authored here. The operator creates and owns it from
# the Helm value loadBalancer.dnsZone.domain (see values.yaml).
