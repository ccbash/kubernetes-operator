# Makes the Kubernetes API Service reachable over the mesh: the operator creates
# a NetworkResource (its ClusterIP) and a DNSRecord (kubernetes-default.<zone>).
# Mesh peers reach it directly through the routing peers — no reverse proxy. To
# additionally publish it through the proxy (L4), create a ReverseProxyService
# referencing this route (see nginx.yaml for the pattern).
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: kubernetes
  namespace: default
spec:
  parentRefs:
  - name: netbird
    namespace: netbird
  rules:
  - backendRefs:
    - name: kubernetes
      port: 443
