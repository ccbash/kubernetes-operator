# A NetBird network. The Gateway below links to it and deploys the routing-peer
# pods that make the cluster's Services reachable in this network.
apiVersion: netbird.io/v1alpha1
kind: Network
metadata:
  name: netbird
  namespace: netbird
spec:
  name: netbird
---
# The operator provides this one GatewayClass.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: netbird
spec:
  controllerName: "gateway.netbird.io/controller"
---
# One Gateway fronts the network. Its single listener selects the Network (by
# name) and its hostname becomes the DNS zone the operator manages — per-service
# records are published as <svc>-<ns>.<hostname>. Both HTTPRoute and TCPRoute
# attach here; whether a route is exposed publicly is decided by creating a
# ReverseProxyService for it (see nginx.yaml).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: netbird
  namespace: netbird
spec:
  gatewayClassName: netbird
  listeners:
  - protocol: gateway.netbird.io/Network
    name: netbird            # -> the Network above
    port: 1
    hostname: cluster.local  # -> the managed DNS zone
