apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  hostnames:
  - nginx-test-app.eu1.netbird.services
  parentRefs:
  - name: netbird
    namespace: netbird
  rules:
    - backendRefs:
        - name: nginx
          port: 80
---
# Exposes the HTTPRoute above through the NetBird reverse proxy. Creating this is
# the decision to publish the route; the operator builds the proxy service's
# targets from the route's backends. proxyCluster is required.
apiVersion: netbird.io/v1alpha1
kind: ReverseProxyService
metadata:
  name: nginx
  namespace: default
spec:
  routeRef:
    kind: HTTPRoute
    name: nginx
  proxyCluster: gate.example.com   # your NetBird reverse-proxy cluster address
  upstream: hostname               # hostname (proxy resolves the FQDN; dualstack) | ip
  crowdsecMode: observe            # off | observe | enforce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - image: nginx
        imagePullPolicy: Always
        name: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: nginx
